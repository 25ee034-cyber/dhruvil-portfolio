<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates | Dhruvil</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body id="dynamic-theme">
<video
  id="weather-video"
  autoplay
  muted
  loop
  playsinline>
</video>

    <!-- ===== NAVBAR ===== -->

    <header class="navbar">
        <h2 class="logo">Dhruvil</h2>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="skills.html">Skills</a>
            <a href="playground.html">Playground</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
            <a href="certificates.html" class="active">Certificates</a>

            <a href="https://github.com/pateldhruvil2008/college-website/tree/main/materials"
                target="_blank">
                Materials
            </a>
        </nav>

        <button id="theme-toggle" class="theme-btn">🌙</button>
    </header>

    <!-- ===== CERTIFICATES SECTION ===== -->

    <section class="certificates-section">

        <h1 class="certificates-title">
            🏆 My Certificates
        </h1>

        <p class="certificates-subtitle">
            My Learning Journey & Achievements
        </p>

        <div class="stats">

            <div class="stat-box">
                <h3 id="totalCertificates">0</h3>
                <p>Certificates</p>
            </div>

            <div class="stat-box">
                <h3 id="totalIssuers">0</h3>
                <p>Organizations</p>
            </div>

            <div class="stat-box">
                <h3 id="latestYear">2026</h3>
                <p>Latest Achievement</p>
            </div>

        </div>

        <div id="certificate-container"></div>

    </section>

    <!-- ===== FOOTER ===== -->

    <footer>
        <p>
            © <span id="year"></span> Dhruvil ·
            <span class="last-updated">
                Last updated:
                <span id="lastUpdated"></span>
            </span>
        </p>
    </footer>
<div id="storyModal" class="story-modal">
    <div class="story-content">

        <span class="close-story"
        onclick="closeStory()">
        &times;
        </span>

        <h2 id="storyTitle"></h2>

        <p id="storyText"></p>

    </div>
</div>

<!-- Chatbot Button -->
<div id="chat-btn">
  <div class="ai-orb">
    <span class="orb-icon">⚡</span>
  </div>
  <span class="chat-tooltip">Ask Dhruvil AI</span>
</div>

<!-- Chatbot Box -->
<div id="chat-box">
  <div class="chat-header">

  <span>Dhruvil AI ⚡</span>

  <button onclick="clearChat()" class="clear-chat-btn">
    🗑
  </button>

</div>

  <div id="chat-messages">
    <div class="bot-msg">
      Hello! Choose an option 👇
    </div>

    <button onclick="askQuestion('about')">About Me</button>
    <button onclick="askQuestion('skills')">Skills</button>
    <button onclick="askQuestion('projects')">Projects</button>
    <button onclick="askQuestion('contact')">Contact</button>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Ask a question...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>
<!-- ===== JS ===== -->
 <script src="js/script.js"></script>
    <!-- ===== JS ===== -->

    <script src="js/certificates.js"></script>
    <script src="js/darkmode.js"></script>
    <script src="js/last-updated.js"></script>

    <script>
        document.getElementById("year").textContent =
            new Date().getFullYear();
    </script>

</body>

</html>
