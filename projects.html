<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>
<body id="dynamic-theme">
  <video
    id="weather-video"
    autoplay
    muted
    loop
    playsinline>
  </video>
  <div class="animated-bg"></div>

<header class="navbar">
  <h2 class="logo">Dhruvil</h2>
  <nav>
    <a href="index.html" class="active">Home</a>
    <a href="about.html">About</a>
    <a href="skills.html">Skills</a>
    <a href="playground.html">Playground</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
    <a href="certificates.html">Certificates</a>
    
    <!-- ✅ MATERIALS (GitHub Folder View) -->
    <a 
      href="https://github.com/pateldhruvil2008/college-website/tree/main/materials"
      target="_blank"
    >
      Materials
    </a>
  </nav>
  <button id="theme-toggle" class="theme-btn">🌙</button>
</header>

<section class="page">
  <h1>My Projects</h1>
  <p class="contact-subtitle">
    Projects fetched directly from my GitHub
  </p>

  <!-- Projects will load here -->
  <div id="projects-container" class="projects-grid">
    <p>Loading projects...</p>
  </div>
</section>
<!-- Chatbot Button -->
<div id="chat-btn">
  <div class="ai-orb">
    <span class="orb-icon">⚡</span>
  </div>
  <span class="chat-tooltip">Ask Dhruvil AI</span>
</div>

<!-- Chatbot Box -->
<div id="chat-box">
  <div class="chat-header">

  <span>Dhruvil AI ⚡</span>

  <button onclick="clearChat()" class="clear-chat-btn">
    🗑
  </button>

</div>

  <div id="chat-messages">
    <div class="bot-msg">
      Hello! Choose an option 👇
    </div>

    <button onclick="askQuestion('about')">About Me</button>
    <button onclick="askQuestion('skills')">Skills</button>
    <button onclick="askQuestion('projects')">Projects</button>
    <button onclick="askQuestion('contact')">Contact</button>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Ask a question...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>
<!-- ===== JS ===== -->
 <script src="js/script.js"></script>
<script src="js/darkmode.js"></script>
<script src="js/projects.js"></script>
</body>
</html>
